<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynthAuth — Identity Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --bg:         #0a0a0f;
    --bg2:        #0f0f1a;
    --scanline:   rgba(0, 255, 180, 0.03);
    --green:      #00ffb4;
    --green-dim:  #00c88a;
    --green-dark: #004d36;
    --amber:      #ffb800;
    --amber-dim:  #a07500;
    --red:        #ff4466;
    --blue:       #44aaff;
    --grey:       #445566;
    --text:       #c8e8d8;
    --text-dim:   #5a7a6a;
    --border:     #1a3a2a;
    --cursor-bg:  #00ffb4;
    --glow:       0 0 8px rgba(0, 255, 180, 0.5);
    --glow-strong:0 0 16px rgba(0, 255, 180, 0.8), 0 0 32px rgba(0, 255, 180, 0.3);
    --font-mono:  'Share Tech Mono', 'Courier New', monospace;
    --font-bbs:   'VT323', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* CRT screen effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 999;
  }

  #screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    width: 100%;
    max-width: 800px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--bg2);
    flex-shrink: 0;
  }

  #topbar .logo {
    font-family: var(--font-bbs);
    font-size: 22px;
    color: var(--green);
    text-shadow: var(--glow);
    letter-spacing: 2px;
  }

  #topbar .status-row {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    letter-spacing: 1px;
  }

  #topbar .status-row span {
    color: var(--green-dim);
  }

  /* ── Terminal frame ── */
  #terminal-frame {
    width: 100%;
    max-width: 800px;
    flex: 1;
    border: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.5),
      0 0 1px var(--green-dark),
      0 0 20px rgba(0, 255, 180, 0.05);
  }

  /* ── Output area ── */
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 8px;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: var(--bg); }
  #output::-webkit-scrollbar-thumb { background: var(--green-dark); }

  .line {
    font-family: var(--font-mono);
    font-size: 13.5px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 1.5em;
    animation: fadein 0.12s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .line.system  { color: var(--text-dim); }
  .line.success { color: var(--green); text-shadow: var(--glow); }
  .line.error   { color: var(--red); }
  .line.amber   { color: var(--amber); }
  .line.info    { color: var(--blue); }
  .line.bright  { color: #ffffff; }
  .line.madlib  { color: var(--green-dim); font-style: italic; }

  /* Typing dots while waiting for server */
  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }
  .typing-indicator span {
    width: 5px; height: 5px;
    background: var(--green-dim);
    border-radius: 50%;
    animation: blink-dot 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink-dot {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── Divider ── */
  .term-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 20%, var(--green-dark) 50%, var(--border) 80%, transparent);
    margin: 0 12px;
    flex-shrink: 0;
  }

  /* ── Input area ── */
  #input-area {
    padding: 10px 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  #prompt-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
    min-height: 16px;
    transition: color 0.2s;
  }

  #prompt-label.active { color: var(--green-dim); }

  #input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #prompt-char {
    color: var(--green);
    font-size: 16px;
    text-shadow: var(--glow);
    flex-shrink: 0;
    font-family: var(--font-bbs);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green-dark);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    padding: 2px 4px;
    caret-color: var(--green);
    text-shadow: var(--glow);
    transition: border-color 0.2s;
  }

  #user-input:focus {
    border-bottom-color: var(--green);
    box-shadow: 0 2px 0 -1px var(--green-dark);
  }

  #user-input::placeholder { color: var(--grey); }
  #user-input:disabled {
    color: var(--text-dim);
    border-bottom-color: var(--border);
    cursor: not-allowed;
  }

  #send-btn {
    background: transparent;
    border: 1px solid var(--green-dark);
    color: var(--green-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  #send-btn:hover:not(:disabled) {
    background: var(--green-dark);
    color: var(--green);
    border-color: var(--green);
    box-shadow: var(--glow);
  }

  #send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ── Bottom bar ── */
  #bottombar {
    width: 100%;
    max-width: 800px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-top: none;
    background: var(--bg2);
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  #bottombar .hint { color: var(--amber-dim); }
  #bottombar .conn-state { color: var(--green-dim); }
  #bottombar .conn-state.error { color: var(--red); }

  /* ── Session badge ── */
  #session-badge {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--green-dark);
    background: rgba(0,255,180,0.05);
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--green-dim);
    animation: fadein 0.3s ease;
    width: 100%;
    max-width: 800px;
  }

  #session-badge.visible { display: flex; }
  #session-badge .badge-id { color: var(--green); font-weight: bold; }

  #logout-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--grey);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #logout-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* ── Restart button (shown after flow completes) ── */
  #restart-btn {
    display: none;
    background: transparent;
    border: 1px solid var(--green-dark);
    color: var(--green-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 16px;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 8px;
    transition: all 0.15s;
    align-self: flex-start;
  }
  #restart-btn.visible { display: block; }
  #restart-btn:hover {
    background: var(--green-dark);
    color: var(--green);
    border-color: var(--green);
    box-shadow: var(--glow);
  }

  /* ── Boot animation ── */
  @keyframes boot-flash {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { opacity: 0; }
  }

  #boot-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    font-family: var(--font-bbs);
    font-size: 28px;
    color: var(--green);
    text-shadow: var(--glow-strong);
    letter-spacing: 4px;
    animation: boot-flash 1.4s ease forwards;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="boot-overlay">SYNTHDOOR AUTH</div>

<div id="screen">

  <!-- Session badge (shown when logged in) -->
  <div id="session-badge">
    <span>SESSION ACTIVE —</span>
    <span class="badge-id" id="badge-id"></span>
    <button id="logout-btn">LOGOUT</button>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">◈ SYNTHDOOR</div>
    <div class="status-row">
      DIS &nbsp;|&nbsp; NODE: <span id="node-id">--</span> &nbsp;|&nbsp;
      <span id="clock">--:--:--</span>
    </div>
  </div>

  <!-- Terminal frame -->
  <div id="terminal-frame">

    <div id="output">
      <!-- lines appear here -->
    </div>

    <div class="term-divider"></div>

    <div id="input-area">
      <div id="prompt-label">CONNECTING...</div>
      <div id="input-row">
        <span id="prompt-char">▶</span>
        <input
          id="user-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder=""
          disabled
        />
        <button id="send-btn" disabled>SEND</button>
      </div>
      <button id="restart-btn">[ NEW SESSION ]</button>
    </div>

  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <span class="hint">ENTER to send &nbsp;·&nbsp; "new" to register &nbsp;·&nbsp; "recover" or enter XXXX-XXXX to restore</span>
    <span class="conn-state" id="conn-state">CONNECTING</span>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// SynthAuth Web Terminal
// ---------------------------------------------------------------------------

const output      = document.getElementById('output');
const userInput   = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const promptLabel = document.getElementById('prompt-label');
const connState   = document.getElementById('conn-state');
const restartBtn  = document.getElementById('restart-btn');
const sessionBadge= document.getElementById('session-badge');
const badgeId     = document.getElementById('badge-id');
const logoutBtn   = document.getElementById('logout-btn');
const nodeId      = document.getElementById('node-id');
const clock       = document.getElementById('clock');

let sessionId   = null;
let eventSource = null;
let flowDone    = false;

// Assign a pseudo-node ID for the display
nodeId.textContent = Math.random().toString(36).slice(2,6).toUpperCase();

// Clock
function updateClock() {
  clock.textContent = new Date().toLocaleTimeString('en-GB');
}
updateClock();
setInterval(updateClock, 1000);

// ---------------------------------------------------------------------------
// Output helpers
// ---------------------------------------------------------------------------

function classifyLine(text) {
  if (!text || text.trim() === '') return 'line';
  if (text.startsWith('Welcome back') || text.startsWith('Welcome,') || text.startsWith('Identity confirmed')) return 'line success';
  if (text.includes('User not found')) return 'line amber';
  if (text.includes('Invalid identity') || text.includes('Invalid') || text.includes('Too many') || text.includes('cancelled') || text.includes('Recovery code invalid')) return 'line error';
  if (text.startsWith('  •') || text.startsWith('• ')) return 'line madlib';
  if (text.startsWith('Your code words') || text.startsWith('Your recovery') || text.startsWith('Your identity')) return 'line amber';
  if (text.startsWith('  -') || text.startsWith("  Don't") || text.startsWith('  Remember')) return 'line info';
  if (text.includes('CONNECTING') || text.startsWith('---')) return 'line system';
  return 'line';
}

// Scroll to the bottom after the browser has finished laying out new content.
// Using rAF + a second rAF ensures we scroll after paint, not before.
function scrollToBottom() {
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      output.scrollTop = output.scrollHeight;
    });
  });
}

function appendLine(text, classOverride) {
  const div = document.createElement('div');
  div.className = classOverride || classifyLine(text);
  div.textContent = text;
  output.appendChild(div);
  scrollToBottom();
  return div;
}

function appendBlank() {
  appendLine('', 'line');
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'line';
  div.id = 'typing-indicator';
  div.innerHTML = '<span class="typing-indicator"><span></span><span></span><span></span></span>';
  output.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ---------------------------------------------------------------------------
// Input enable/disable
// ---------------------------------------------------------------------------

function enableInput(promptText) {
  promptLabel.textContent = promptText || 'INPUT';
  promptLabel.classList.add('active');
  userInput.disabled = false;
  sendBtn.disabled   = false;
  userInput.focus();
  hideTyping();
  scrollToBottom();
}

function disableInput() {
  promptLabel.textContent = 'PROCESSING...';
  promptLabel.classList.remove('active');
  userInput.disabled = true;
  sendBtn.disabled   = true;
}

// ---------------------------------------------------------------------------
// Start a new auth flow
// ---------------------------------------------------------------------------

async function startFlow() {
  // Reset UI
  output.innerHTML = '';
  restartBtn.classList.remove('visible');
  flowDone = false;
  disableInput();
  userInput.value = '';

  connState.textContent = 'CONNECTING';
  connState.className   = 'conn-state';

  // Close previous SSE if any
  if (eventSource) { eventSource.close(); eventSource = null; }

  // Request a new session
  let data;
  try {
    const resp = await fetch('/api/start', { method: 'POST' });
    data = await resp.json();
  } catch (e) {
    appendLine('Connection failed. Server may be offline.', 'line error');
    connState.textContent = 'OFFLINE';
    connState.classList.add('error');
    return;
  }

  sessionId = data.sessionId;

  // Open SSE stream
  eventSource = new EventSource(`/api/stream/${sessionId}`);
  connState.textContent = 'CONNECTED';

  eventSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'line') {
      hideTyping();
      appendLine(msg.text);
    }

    else if (msg.type === 'prompt') {
      hideTyping();
      enableInput(msg.text);
    }

    else if (msg.type === 'done') {
      flowDone = true;
      disableInput();
      connState.textContent = 'FLOW COMPLETE';
      restartBtn.classList.add('visible');
      eventSource.close();

      // If success, save token as cookie + update session badge
      const result = msg.result;
      if (result && result.success && result.token) {
        document.cookie = `synthauth_token=${result.token}; path=/; SameSite=Strict`;
        badgeId.textContent = result.publicId;
        sessionBadge.classList.add('visible');
      }
    }

    else if (msg.type === 'error') {
      appendLine(`Server error: ${msg.message}`, 'line error');
      flowDone = true;
      disableInput();
      connState.textContent = 'ERROR';
      connState.classList.add('error');
      restartBtn.classList.add('visible');
    }
  };

  eventSource.onerror = () => {
    if (!flowDone) {
      connState.textContent = 'DISCONNECTED';
      connState.classList.add('error');
    }
  };

  showTyping();
}

// ---------------------------------------------------------------------------
// Send user input
// ---------------------------------------------------------------------------

async function sendInput() {
  if (!sessionId || flowDone) return;
  const val = userInput.value;

  // Echo input to terminal (show what user typed)
  appendLine('▶  ' + val, 'line bright');

  disableInput();
  userInput.value = '';
  showTyping();

  try {
    await fetch(`/api/respond/${sessionId}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ input: val }),
    });
  } catch (e) {
    appendLine('Send failed. Check your connection.', 'line error');
    disableInput();
  }
}

// ---------------------------------------------------------------------------
// Logout
// ---------------------------------------------------------------------------

async function logout() {
  const token = getCookie('synthauth_token');
  if (token) {
    await fetch('/api/logout', {
      method:  'POST',
      headers: { 'X-SynthAuth-Token': token },
    });
    document.cookie = 'synthauth_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
  }
  sessionBadge.classList.remove('visible');
  startFlow();
}

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? match[2] : null;
}

// ---------------------------------------------------------------------------
// Event listeners
// ---------------------------------------------------------------------------

sendBtn.addEventListener('click', sendInput);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendInput();
});
restartBtn.addEventListener('click', startFlow);
logoutBtn.addEventListener('click', logout);

// ---------------------------------------------------------------------------
// Boot: check for existing session or start fresh
// ---------------------------------------------------------------------------

async function boot() {
  // Wait for boot animation
  await new Promise(r => setTimeout(r, 1200));

  // Check for an existing session
  const token = getCookie('synthauth_token');
  if (token) {
    const resp = await fetch('/api/session', {
      headers: { 'X-SynthAuth-Token': token },
    });
    const data = await resp.json();
    if (data.authenticated) {
      badgeId.textContent = data.publicId;
      sessionBadge.classList.add('visible');
      appendLine('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'line system');
      appendLine('  Session resumed.', 'line success');
      appendLine(`  Authenticated as: ${data.publicId}`, 'line success');
      appendLine('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'line system');
      appendBlank();
      appendLine('  (You are already logged in. Click LOGOUT above to switch accounts.)', 'line system');
      restartBtn.classList.add('visible');
      restartBtn.textContent = '[ NEW AUTH SESSION ]';
      connState.textContent = 'AUTHENTICATED';
      return;
    }
  }

  startFlow();
}

boot();
</script>
</body>
</html>
